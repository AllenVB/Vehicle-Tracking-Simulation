spring:
  application:
    name: vts-simulator
  profiles:
    default: dev
  # Java 21 virtual threads: one carrier-light thread per simulated vehicle tick
  threads:
    virtual:
      enabled: true

server:
  port: 8085

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  # Dagitik izleme. Ornekleme %2: 105 arac saniyede bir olcum gonderiyor, hepsini
  # izlemek saniyede ~600 span eder ve Jaeger'in bellegini birkac dakikada doldurur.
  # Yuzde iki, dakikada ~120 iz demek -- bir hattin nasil davrandigini gormek icin fazlasiyla
  # yeterli, sistemi tasimayacagi bir yuke sokmadan.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.02}
  otlp:
    tracing:
      # Uc verilmezse Boot varsayilan olarak localhost'a gonderir ve her istek sessizce
      # basarisiz olur; compose bunu jaeger'a yonlendirir.
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}

# Ingestion endpoint the simulator posts telemetry batches to
vts:
  simulator:
    ingestion-base-url: http://localhost:8081
  # Fleet size and tick interval come ONLY from the active profile below,
  # never hard-coded in Java.

---
spring:
  config:
    activate:
      on-profile: dev
vts:
  simulator:
    # 100 kara aracı + 5 helikopter (index 101..105) = 105 kapasite.
    vehicle-count: 105
    tick: 1s

---
spring:
  config:
    activate:
      on-profile: load
vts:
  simulator:
    vehicle-count: 1000
    tick: 1s
