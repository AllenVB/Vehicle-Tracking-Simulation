<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTS · Operatör Konsolu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        :root {
            --bg: #1a1410; --panel: #241c14; --panel-2: #30251a; --line: #43331f;
            --text: #f3ece2; --muted: #b39c82; --accent: #e08a1d; --auto: #378add;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
        body { display: flex; background: var(--bg); color: var(--text); }

        #panel { width: 340px; flex: 0 0 340px; background: var(--panel); border-right: 1px solid var(--line);
                 display: flex; flex-direction: column; overflow-y: auto; }
        #panel header { padding: 16px 18px; border-bottom: 1px solid var(--line); }
        #panel header h1 { font-size: 15px; margin: 0; }
        #panel header .sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
        .box { padding: 14px 18px; border-bottom: 1px solid var(--line); }
        .box h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 0 0 10px; }
        label { display: block; font-size: 12px; color: var(--muted); margin: 8px 0 4px; }
        input { width: 100%; padding: 9px 11px; border-radius: 7px; border: 1px solid var(--line);
                background: var(--panel-2); color: var(--text); font-size: 14px; }
        .btn { width: 100%; margin-top: 12px; padding: 9px; border: 0; border-radius: 7px;
               font-weight: 600; font-size: 13px; cursor: pointer; color: #201607; background: var(--accent); }
        .btn.secondary { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); }
        .btn:disabled { opacity: .5; cursor: default; }
        ol { margin: 6px 0 0; padding-left: 18px; font-size: 12.5px; color: var(--muted); line-height: 1.7; }
        .sel { font-size: 20px; font-weight: 700; }
        .sel small { font-size: 12px; color: var(--muted); font-weight: 400; }
        .pill { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
        .pill.manual { background: rgba(224,138,29,.2); color: var(--accent); }
        .pill.auto { background: rgba(55,138,221,.2); color: var(--auto); }
        #status { font-size: 12px; color: var(--muted); min-height: 16px; }
        .legend { display: flex; gap: 14px; font-size: 12px; color: var(--muted); }
        .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

        #map { flex: 1; height: 100%; background: #e9e4dc; cursor: crosshair; }
        .veh-num { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px;
                   border-radius: 50%; font-size: 11px; font-weight: 700; color: #fff; border: 2px solid #fff;
                   box-shadow: 0 1px 3px rgba(0,0,0,.4); }
        .veh-num.auto { background: var(--auto); }
        .veh-num.manual { background: var(--accent); }
        .veh-num.selected { outline: 3px solid #ffd27f; }
    </style>
</head>
<body>
<aside id="panel">
    <header>
        <h1>VTS · Operatör Konsolu</h1>
        <div class="sub">Simülatör · port 8085</div>
    </header>

    <div class="box">
        <h2>Araç konumu değiştir</h2>
        <ol>
            <li>Araç numarasını gir (1–100).</li>
            <li>Haritada yeni konuma <b>çift tıkla</b>.</li>
            <li>Ana harita 1 sn içinde güncellenir.</li>
        </ol>
        <p style="font-size:12px;color:var(--muted);margin:8px 0 0">
            Araç seçili değilken çift tık haritayı yakınlaştırır.</p>
        <label>Araç numarası</label>
        <input id="vid" type="number" min="1" max="100" placeholder="örn. 34"/>
        <div id="selInfo" style="margin-top:12px"></div>
        <button class="btn secondary" id="releaseBtn" disabled>Otomatiğe döndür</button>
    </div>

    <div class="box">
        <h2>Durum</h2>
        <div id="status">Yükleniyor…</div>
    </div>

    <div class="box">
        <h2>Gösterim</h2>
        <div class="legend">
            <span><span class="dot" style="background:var(--auto)"></span>Otomatik</span>
            <span><span class="dot" style="background:var(--accent)"></span>Elle (sabit)</span>
        </div>
    </div>
</aside>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/console.js"></script>
</body>
</html>
