spring:
  application:
    name: vts-api-gateway
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vts}
    username: ${DB_USER:vts}
    password: ${DB_PASSWORD:vts}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  # Flyway owns the schema (migrations V1..V15). Scale-varying values are passed
  # as placeholders so the same SQL adapts per profile (see profile blocks below).
  flyway:
    enabled: true
    baseline-on-migrate: false
    placeholders:
      telemetry_chunk_interval: 1 day
      retention_days: "30"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: vts-gateway
      auto-offset-reset: latest

server:
  port: 8080

# JWT is validated locally (HS256/RS256); issuer config comes with the auth work
vts:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-only-secret-key-256bit}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# Load profile: smaller chunks and shorter retention for high-ingest testing.
spring:
  config:
    activate:
      on-profile: load
  flyway:
    placeholders:
      telemetry_chunk_interval: 1 hour
      retention_days: "7"
