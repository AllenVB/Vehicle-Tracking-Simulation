spring:
  application:
    name: vts-api-gateway
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vts}
    username: ${DB_USER:vts}
    password: ${DB_PASSWORD:vts}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  # Flyway owns the schema (migrations V1..V15). Scale-varying values are passed
  # as placeholders so the same SQL adapts per profile (see profile blocks below).
  flyway:
    enabled: true
    baseline-on-migrate: false
    placeholders:
      telemetry_chunk_interval: 1 day
      retention_days: "30"
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Kafka uzerinden iz zincirini surdurur: uretici, iz kimligini mesaj basligina
    # yazar; tuketici onu okuyup kendi span'ini ayni ize baglar. Bu ayar olmadan zincir
    # tam Kafka'da kopar ve geriye birbirine baglanmayan iki yarim iz kalir -- oysa
    # hattaki en uzun bekleme genellikle tam orada.
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    consumer:
      group-id: vts-gateway
      auto-offset-reset: latest

server:
  port: 8080

# JWT is validated locally (HS256/RS256); issuer config comes with the auth work
vts:
  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-prod-this-is-a-dev-only-secret-key-256bit}
  simulator:
    # Operator control is proxied here so the whole UI lives on one origin.
    base-url: ${SIMULATOR_BASE_URL:http://localhost:8085}
    # Short: this proxies an interactive operator click, so failing fast beats hanging.
    connect-timeout: 2s
    read-timeout: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  # Dagitik izleme. Ornekleme %2: 105 arac saniyede bir olcum gonderiyor, hepsini
  # izlemek saniyede ~600 span eder ve Jaeger'in bellegini birkac dakikada doldurur.
  # Yuzde iki, dakikada ~120 iz demek -- bir hattin nasil davrandigini gormek icin fazlasiyla
  # yeterli, sistemi tasimayacagi bir yuke sokmadan.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.02}
  otlp:
    tracing:
      # Uc verilmezse Boot varsayilan olarak localhost'a gonderir ve her istek sessizce
      # basarisiz olur; compose bunu jaeger'a yonlendirir.
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# Load profile: smaller chunks and shorter retention for high-ingest testing.
spring:
  config:
    activate:
      on-profile: load
  flyway:
    placeholders:
      telemetry_chunk_interval: 1 hour
      retention_days: "7"
