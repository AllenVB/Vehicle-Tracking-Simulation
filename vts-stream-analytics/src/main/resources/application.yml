spring:
  application:
    name: vts-stream-analytics
  profiles:
    default: dev
  # Read-only: active geofence polygons are loaded at startup for point-in-polygon
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vts}
    username: ${DB_USER:vts}
    password: ${DB_PASSWORD:vts}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    streams:
      application-id: vts-stream-analytics
      properties:
        # RocksDB-backed state stores hold per-vehicle stateful rule context.
        # Their native memory is bounded by a shared cache (see BoundedRocksDBConfig);
        # otherwise ~120 RocksDB instances (stores x partitions) each take their own.
        num.stream.threads: 4
        processing.guarantee: at_least_once
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
        # Akış zamanı "aracın oradaki anı"nı ifade etsin, "haberi aldığımız anı"nı değil.
        # Kafka'nın kayıt zaman damgası üreticinin yazdığı andır; bu hatta ingestion zamanıdır.
        # Gerçek bir cihaz kapsama boşluğunda tamponlar ve saatlik geçmişi tek seferde basar --
        # varsayılan çıkarıcıyla o kayıtlar "şimdi olmuş" sayılır ve hiçbir hata vermeden
        # yolculuk ortadan kapanır, ihlal yanlış güne yazılır.
        default.timestamp.extractor: com.fleet.vts.analytics.config.EventTimeExtractor
        rocksdb.config.setter: com.fleet.vts.analytics.config.BoundedRocksDBConfig
        statestore.cache.max.bytes: 16777216

vts:
  analytics:
    event-time:
      # Pencere kapandıktan sonra geç gelen ölçüme tanınan süre. Bedeli açık:
      # bastırılmış pencere tam bu kadar geç yayınlanır.
      grace: 15m
      # Kapsama boşluğundaki cihazın sessizliği, park etmiş araçtan ayırt edilemez.
      # Punctuator bu kadar bekler; dönen cihaz yolculuğu ikiye bölünmeden devam eder.
      trip-close-grace: 15m

server:
  port: 8083
  tomcat:
    # Bu port yalnizca /actuator/* sunar ve tek istemcisi var: Prometheus, 15 saniyede
    # bir. Varsayilan 200 is parcacigi hicbir zaman kullanilmayacak yigin alani ayirir;
    # bu serviste her MB'in RocksDB'ye ayrilmis bir karsiligi var.
    threads:
      max: 5
      min-spare: 1

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  # Dagitik izleme. Ornekleme %2: 105 arac saniyede bir olcum gonderiyor, hepsini
  # izlemek saniyede ~600 span eder ve Jaeger'in bellegini birkac dakikada doldurur.
  # Yuzde iki, dakikada ~120 iz demek -- bir hattin nasil davrandigini gormek icin fazlasiyla
  # yeterli, sistemi tasimayacagi bir yuke sokmadan.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.02}
  otlp:
    tracing:
      # Uc verilmezse Boot varsayilan olarak localhost'a gonderir ve her istek sessizce
      # basarisiz olur; compose bunu jaeger'a yonlendirir.
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}
