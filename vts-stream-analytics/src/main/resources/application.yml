spring:
  application:
    name: vts-stream-analytics
  profiles:
    default: dev
  # Read-only: active geofence polygons are loaded at startup for point-in-polygon
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vts}
    username: ${DB_USER:vts}
    password: ${DB_PASSWORD:vts}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    streams:
      application-id: vts-stream-analytics
      properties:
        # RocksDB-backed state stores hold per-vehicle stateful rule context.
        # Their native memory is bounded by a shared cache (see BoundedRocksDBConfig);
        # otherwise ~120 RocksDB instances (stores x partitions) each take their own.
        num.stream.threads: 4
        processing.guarantee: at_least_once
        default.deserialization.exception.handler: org.apache.kafka.streams.errors.LogAndContinueExceptionHandler
        rocksdb.config.setter: com.fleet.vts.analytics.config.BoundedRocksDBConfig
        statestore.cache.max.bytes: 16777216

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
