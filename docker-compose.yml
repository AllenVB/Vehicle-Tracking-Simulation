# Dev infrastructure: single Kafka broker (KRaft), TimescaleDB+PostGIS, Redis,
# Kafka UI, Prometheus and Grafana. Application services are added to this file
# as they are implemented in later steps.
#
#   docker compose up -d
#
# The load profile (3 brokers, scaled replicas) lives in docker-compose.load.yml.
name: vts

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: vts-kafka
    ports:
      - "9092:9094"   # host clients -> localhost:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data

  # One-shot container: creates every topic with exactly 24 partitions.
  # Partition count is fixed across all profiles (see scale constraints).
  kafka-init:
    image: apache/kafka:3.8.1
    container_name: vts-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BS=kafka:9092
        create() { /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists --topic "$$1" --partitions "$${2:-24}" --replication-factor 1; }
        create vehicle.telemetry.raw
        create vehicle.telemetry.processed
        create vehicle.telemetry.dlq
        create vehicle.telemetry.raw.retry-5s
        create vehicle.telemetry.raw.retry-1m
        create vehicle.violation
        create vehicle.geofence.event
        create vehicle.trip
        create vehicle.notification
        create vehicle.rule.cache-invalidation 1
        # Dead-letter topic per consumed topic, named by Topics.dlqFor(). Same partition
        # count: a dead letter keeps its original partition, so per-vehicle ordering
        # survives a replay. vehicle.telemetry.raw is the exception -- its dead letters
        # go to vehicle.telemetry.dlq, created above.
        create vehicle.telemetry.processed.dlq
        create vehicle.violation.dlq
        create vehicle.geofence.event.dlq
        create vehicle.trip.dlq
        create vehicle.notification.dlq
        echo "topics ready:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --list

  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: vts-postgres
    ports:
      # Host 5433 to avoid clashing with any local Postgres on 5432; services
      # still reach it in-network as postgres:5432. Host tools: localhost:5433.
      - "5433:5432"
    environment:
      POSTGRES_DB: vts
      POSTGRES_USER: vts
      POSTGRES_PASSWORD: vts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vts -d vts"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/home/postgres/pgdata/data

  redis:
    image: redis:7-alpine
    container_name: vts-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  # ── OSRM: yerel rota motoru ────────────────────────────────────────────────
  # Kara araçlarının yoldan gitmesi buna bağlı. Simülatör public OSRM demo
  # sunucusunu kullanıyordu; o yavaşlayınca/yanıt vermeyince araçlar sentetik
  # düz çizgilere düşüyor ve dağdan/gölden geçiyordu. Rota motoru artık yerel:
  # başkasının rate limit'i bizim filomuzu araziye sürmez.
  #
  # İlk çalıştırma pahalıdır: ~400MB harita indirilir ve ön işlenir. Sonuç bir
  # volume'da kalır; sonraki açılışlar anında.
  #
  # BELLEK: osrm-extract Türkiye haritası için ~6GB ister ve yetmezse çekirdek
  # tarafından öldürülür (exit 137). Docker'a ayrılan bellek WSL2'de varsayılan
  # olarak makinenin yarısıdır ve yığının geri kalanı da onu paylaşır. İlk kurulum
  # OOM ile düşerse, ön işlemeyi yığın kapalıyken tek başına çalıştırın:
  #
  #   docker compose stop $(docker compose ps --services | grep -v osrm)
  #   docker compose up osrm-init
  #   docker compose up -d
  #
  # Bu bir kereliktir; veri hazırlandıktan sonra osrm-routed birkaç yüz MB ile çalışır.

  # 1) Harita verisi. Ayrı bir konteyner çünkü osrm-backend imajında curl yok.
  osrm-fetch:
    image: curlimages/curl:8.11.1
    container_name: vts-osrm-fetch
    volumes:
      - osrm-data:/data
    user: root
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f /data/turkey-latest.osm.pbf ]; then
          echo "OSM verisi zaten var, indirme atlandı"; exit 0
        fi
        echo "Türkiye OSM verisi indiriliyor (~400MB)..."
        curl -fsSL --retry 3 -o /data/turkey-latest.osm.pbf.part \
          "${OSM_EXTRACT_URL:-https://download.geofabrik.de/europe/turkey-latest.osm.pbf}"
        mv /data/turkey-latest.osm.pbf.part /data/turkey-latest.osm.pbf
        echo "indirildi"

  # 2) Ön işleme (extract -> partition -> customize). MLD algoritması.
  osrm-init:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    container_name: vts-osrm-init
    depends_on:
      osrm-fetch:
        condition: service_completed_successfully
    volumes:
      - osrm-data:/data
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cd /data
        # .mldgr, customize adımının son çıktısı: varsa hazırız.
        if [ -f turkey-latest.osrm.mldgr ]; then
          echo "OSRM verisi zaten hazır"; exit 0
        fi
        echo "osrm-extract..."   && osrm-extract -p /opt/car.lua turkey-latest.osm.pbf
        echo "osrm-partition..." && osrm-partition turkey-latest.osrm
        echo "osrm-customize..." && osrm-customize turkey-latest.osrm
        echo "OSRM verisi hazır"

  # 3) Rota servisi.
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    container_name: vts-osrm
    depends_on:
      osrm-init:
        condition: service_completed_successfully
    volumes:
      - osrm-data:/data
    command: osrm-routed --algorithm mld /data/turkey-latest.osrm
    expose: ["5000"]
    healthcheck:
      # osrm-routed portu ancak veriyi yükledikten sonra dinlemeye başlar, bu
      # yüzden port kontrolü "hazır mı" sorusunun doğru cevabı.
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/5000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  kafka-ui:
    # Sabitlenmiş: :latest ile build'ler tekrarlanabilir olmaz — bir gün çalışan yığın
    # ertesi gün upstream değiştiği için farklı davranır. Bu sürüm, sabitlendiği anda
    # :latest'in çözüldüğü digest'in ta kendisi.
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: vts-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vts-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: vts-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:13.1.0
    container_name: vts-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  # ── Application services ────────────────────────────────────────────────
  # api-gateway owns the schema (runs Flyway on startup); the others start after
  # it and re-connect with retries until the schema is ready.
  api-gateway:
    build: {context: ., args: {MODULE: vts-api-gateway}}
    container_name: vts-api-gateway
    mem_limit: 512m
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
      redis: {condition: service_healthy}
    environment:
      <<: &db-kafka-redis
        DB_URL: jdbc:postgresql://postgres:5432/vts
        DB_USER: vts
        DB_PASSWORD: vts
        KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        REDIS_HOST: redis
        REDIS_PORT: "6379"
      # The gateway serves the whole UI and proxies operator control to the simulator.
      SIMULATOR_BASE_URL: http://simulator:8085
    ports: ["8080:8080"]
    restart: unless-stopped

  ingestion-service:
    build: {context: ., args: {MODULE: vts-ingestion-service}}
    container_name: vts-ingestion-service
    mem_limit: 448m
    depends_on: {api-gateway: {condition: service_started}, kafka: {condition: service_healthy}}
    environment: *db-kafka-redis
    ports: ["8081:8081"]
    restart: unless-stopped

  processing-service:
    build: {context: ., args: {MODULE: vts-processing-service}}
    container_name: vts-processing-service
    mem_limit: 512m
    depends_on: {api-gateway: {condition: service_started}, kafka: {condition: service_healthy}}
    environment:
      <<: *db-kafka-redis
      DB_URL: jdbc:postgresql://postgres:5432/vts?reWriteBatchedInserts=true
    ports: ["8082:8082"]
    restart: unless-stopped

  stream-analytics:
    build: {context: ., args: {MODULE: vts-stream-analytics}}
    container_name: vts-stream-analytics
    mem_limit: 896m
    depends_on: {api-gateway: {condition: service_started}, kafka: {condition: service_healthy}}
    environment:
      <<: *db-kafka-redis
      # Fixed heap instead of a percentage: this service also holds RocksDB state
      # off-heap, so it needs real headroom under mem_limit or it risks an OOM kill.
      JAVA_OPTS: -Xmx384m -XX:MaxMetaspaceSize=128m
    ports: ["8083:8083"]
    restart: unless-stopped

  notification-service:
    build: {context: ., args: {MODULE: vts-notification-service}}
    container_name: vts-notification-service
    mem_limit: 448m
    depends_on: {api-gateway: {condition: service_started}, kafka: {condition: service_healthy}}
    environment: *db-kafka-redis
    ports: ["8084:8084"]
    restart: unless-stopped

  scheduler-service:
    build: {context: ., args: {MODULE: vts-scheduler-service}}
    container_name: vts-scheduler-service
    mem_limit: 448m
    depends_on: {api-gateway: {condition: service_started}, kafka: {condition: service_healthy}}
    environment: *db-kafka-redis
    ports: ["8086:8086"]
    restart: unless-stopped

  simulator:
    build: {context: ., args: {MODULE: vts-simulator}}
    container_name: vts-simulator
    mem_limit: 448m
    depends_on:
      ingestion-service: {condition: service_started}
      # Rota motoru hazır olmadan başlarsa kara araçlarının hiçbiri yola çıkamaz
      # (yol yoksa park ederler), bu yüzden hazır olmasını bekliyoruz.
      osrm: {condition: service_healthy}
    environment:
      VTS_SIMULATOR_INGESTION_BASE_URL: http://ingestion-service:8081
      VTS_SIMULATOR_OSRM_BASE_URL: http://osrm:5000
    # Kontrol API'si iç ağda kalır; UI ona gateway proxy'si üzerinden erişir.
    # Dışarı açmak, kimliksiz bir "aracı ışınla" ucunu herkese açmak demekti.
    expose: ["8085"]
    restart: unless-stopped

volumes:
  kafka-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  # İndirilen harita + ön işlenmiş OSRM grafiği. Kalıcı: silinirse ilk açılıştaki
  # indirme ve ön işleme (birkaç dakika) tekrarlanır.
  osrm-data:
