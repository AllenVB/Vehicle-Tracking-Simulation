# Dev infrastructure: single Kafka broker (KRaft), TimescaleDB+PostGIS, Redis,
# Kafka UI, Prometheus and Grafana. Application services are added to this file
# as they are implemented in later steps.
#
#   docker compose up -d
#
# The load profile (3 brokers, scaled replicas) lives in docker-compose.load.yml.
name: vts

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: vts-kafka
    ports:
      - "9092:9094"   # host clients -> localhost:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - kafka-data:/var/lib/kafka/data

  # One-shot container: creates every topic with exactly 24 partitions.
  # Partition count is fixed across all profiles (see scale constraints).
  kafka-init:
    image: apache/kafka:3.8.1
    container_name: vts-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        BS=kafka:9092
        create() { /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --create --if-not-exists --topic "$$1" --partitions "$${2:-24}" --replication-factor 1; }
        create vehicle.telemetry.raw
        create vehicle.telemetry.processed
        create vehicle.telemetry.dlq
        create vehicle.telemetry.raw.retry-5s
        create vehicle.telemetry.raw.retry-1m
        create vehicle.violation
        create vehicle.geofence.event
        create vehicle.trip
        create vehicle.notification
        create vehicle.rule.cache-invalidation 1
        echo "topics ready:"
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$BS --list

  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: vts-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vts
      POSTGRES_USER: vts
      POSTGRES_PASSWORD: vts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vts -d vts"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/home/postgres/pgdata/data

  redis:
    image: redis:7-alpine
    container_name: vts-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: vts-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: vts-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

  prometheus:
    image: prom/prometheus:latest
    container_name: vts-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:latest
    container_name: vts-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

volumes:
  kafka-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
