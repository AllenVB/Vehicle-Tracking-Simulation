spring:
  application:
    name: vts-ingestion-service
  profiles:
    default: dev
  # Read-only fallback for the imei -> vehicle lookup (Caffeine -> Redis -> DB)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vts}
    username: ${DB_USER:vts}
    password: ${DB_PASSWORD:vts}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
        compression.type: lz4
        linger.ms: 20
        batch.size: 65536
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
