spring:
  application:
    name: vts-ingestion-service
  profiles:
    default: dev
  # Read-only fallback for the imei -> vehicle lookup (Caffeine -> Redis -> DB)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vts}
    username: ${DB_USER:vts}
    password: ${DB_PASSWORD:vts}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    # Kafka uzerinden iz zincirini surdurur: uretici, iz kimligini mesaj basligina
    # yazar; tuketici onu okuyup kendi span'ini ayni ize baglar. Bu ayar olmadan zincir
    # tam Kafka'da kopar ve geriye birbirine baglanmayan iki yarim iz kalir -- oysa
    # hattaki en uzun bekleme genellikle tam orada.
    template:
      observation-enabled: true
    producer:
      acks: all
      properties:
        enable.idempotence: true
        compression.type: lz4
        linger.ms: 20
        batch.size: 65536
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8081

vts:
  ingestion:
    # Gerçek cihaz kanalı: ham TCP, ikili Codec 8/8E, paket başına ACK.
    # HTTP ucu kalıyor -- ikisi de aynı uygulama çekirdeğine giriyor.
    teltonika:
      enabled: ${TELTONIKA_ENABLED:true}
      port: ${TELTONIKA_PORT:5027}
      # Kapsama boşluğundan dönen cihaz tek pakette yüzlerce kayıt basar.
      max-packet-bytes: 262144
      # Tampon boşaltan cihaz boşluk boyunca susar; erken kapatmak
      # store-and-forward'ı yeniden bağlanma fırtınasına çevirir.
      idle-timeout: 30m

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  # Dagitik izleme. Ornekleme %2: 105 arac saniyede bir olcum gonderiyor, hepsini
  # izlemek saniyede ~600 span eder ve Jaeger'in bellegini birkac dakikada doldurur.
  # Yuzde iki, dakikada ~120 iz demek -- bir hattin nasil davrandigini gormek icin fazlasiyla
  # yeterli, sistemi tasimayacagi bir yuke sokmadan.
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.02}
  otlp:
    tracing:
      # Uc verilmezse Boot varsayilan olarak localhost'a gonderir ve her istek sessizce
      # basarisiz olur; compose bunu jaeger'a yonlendirir.
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}
